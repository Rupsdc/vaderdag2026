<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Een brief voor pap — Vaderdag</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Caveat:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#fdfbf4;
    --paper-edge:#efe9d8;
    --env:#f6efe1;
    --env-shade:#e7ddc7;
    --ink:#3a342c;
    --ink-soft:#6b6356;
    --wax:#9b2d2b;
    --wax-hi:#c94f49;
    --rule:#d8cdb6;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    min-height:100%;
    background:
      linear-gradient(180deg,#f9e7d8 0%,#eecab4 45%,#d3a98e 100%);
    display:flex;align-items:center;justify-content:center;
    padding:24px;font-family:'EB Garamond',Georgia,serif;
    overflow:hidden;position:relative;
  }

  /* ---- pretty ambient background ---- */
  .bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
  .spotlight{
    position:absolute;left:50%;top:42%;transform:translate(-50%,-50%);
    width:760px;height:760px;border-radius:50%;
    background:radial-gradient(circle,rgba(255,249,239,.85) 0%,rgba(255,243,228,.35) 38%,transparent 66%);
    filter:blur(2px);
  }
  .vignette{
    position:absolute;inset:0;
    background:radial-gradient(ellipse at 50% 44%,transparent 52%,rgba(120,78,52,.32) 100%);
  }
  .hearts{position:absolute;inset:0;}
  .hearts span{
    position:absolute;bottom:-30px;
    color:rgba(155,45,43,.30);
    font-size:18px;
    will-change:transform,opacity;
    animation:float linear infinite;
  }
  @keyframes float{
    0%{transform:translateY(0) translateX(0) rotate(0);opacity:0;}
    10%{opacity:.8;}
    50%{transform:translateY(-46vh) translateX(22px) rotate(12deg);}
    90%{opacity:.7;}
    100%{transform:translateY(-96vh) translateX(-14px) rotate(-8deg);opacity:0;}
  }

  .stage{
    position:relative;z-index:2;
    width:min(360px,92vw);
    height:520px;
    perspective:1400px;
    display:flex;align-items:center;justify-content:center;
  }
  /* soft shadow on the "desk" under the envelope */
  .desk-shadow{
    position:absolute;left:50%;top:62%;transform:translate(-50%,-50%);
    width:300px;height:60px;border-radius:50%;
    background:radial-gradient(ellipse,rgba(80,48,28,.30),transparent 70%);
    filter:blur(6px);z-index:1;
    transition:opacity .8s ease;
  }
  .open .desk-shadow{opacity:0;}

  /* ---------------- the letter (revealed) ---------------- */
  .card{
    position:absolute;z-index:5;
    width:min(360px,92vw);
    background:linear-gradient(180deg,var(--paper),var(--paper-edge));
    border-radius:3px;
    padding:42px 36px 34px;
    color:var(--ink);
    box-shadow:0 28px 60px rgba(60,45,25,.38),0 2px 0 #fff inset;
    opacity:0;
    transform:translateY(34px) scale(.92);
    transition:opacity .9s ease,transform 1.1s cubic-bezier(.2,.9,.25,1);
    pointer-events:none;
  }
  .card::before{content:"";position:absolute;left:0;right:0;top:33%;height:1px;
    background:linear-gradient(90deg,transparent,rgba(120,100,60,.10),transparent);}
  .card::after{content:"";position:absolute;left:0;right:0;top:66%;height:1px;
    background:linear-gradient(90deg,transparent,rgba(120,100,60,.10),transparent);}
  .date{text-align:right;font-style:italic;color:var(--ink-soft);font-size:15px;letter-spacing:.4px;margin-bottom:24px;}
  .salut{font-size:23px;margin-bottom:14px;}
  .msg p{font-size:18px;line-height:1.62;margin-bottom:14px;}
  .closing{font-size:18px;margin-top:6px;}
  .sign{font-family:'Caveat',cursive;font-size:34px;color:var(--wax);margin-top:10px;line-height:1;}

  .card .salut,.card .msg p,.card .sign{
    opacity:0;transform:translateY(8px);
    transition:opacity .6s ease,transform .6s ease;
  }
  .open .card{opacity:1;transform:translateY(0) scale(1);transition-delay:.55s;}
  .open .card .salut{opacity:1;transform:none;transition-delay:1.05s;}
  .open .card .msg p{opacity:1;transform:none;transition-delay:1.25s;}
  .open .card .sign{opacity:1;transform:none;transition-delay:1.5s;}

  /* ---------------- the envelope ---------------- */
  .envelope{
    position:absolute;width:320px;height:212px;z-index:10;
    transform-style:preserve-3d;
    transition:opacity .8s ease,transform 1s cubic-bezier(.4,0,.2,1);
    cursor:pointer;
  }
  .env-body{position:absolute;inset:0;
    background:linear-gradient(160deg,var(--env),var(--env-shade));
    border-radius:6px;box-shadow:0 16px 36px rgba(70,52,28,.28);overflow:hidden;}
  .env-body::before{content:"";position:absolute;inset:0;
    background:
      linear-gradient(to bottom right, transparent 49.4%, rgba(0,0,0,.045) 50%, transparent 50.6%),
      linear-gradient(to bottom left, transparent 49.4%, rgba(0,0,0,.045) 50%, transparent 50.6%);}
  .pocket{position:absolute;left:0;right:0;bottom:0;height:212px;
    background:linear-gradient(160deg,#f1e9d8,var(--env-shade));
    clip-path:polygon(0 100%,100% 100%,50% 34%);z-index:3;border-radius:0 0 6px 6px;}
  .flap{position:absolute;top:0;left:0;width:320px;height:118px;
    background:linear-gradient(160deg,#f8f1e3,#e9dec8);
    clip-path:polygon(0 0,100% 0,50% 100%);
    transform-origin:top center;transform:rotateX(0deg);
    transition:transform .8s cubic-bezier(.6,0,.3,1);
    z-index:6;box-shadow:0 2px 6px rgba(0,0,0,.06);backface-visibility:hidden;}

  .stamp{position:absolute;top:14px;right:16px;z-index:4;width:50px;height:60px;
    background:#fbf6ec;padding:5px;box-shadow:0 1px 3px rgba(0,0,0,.18);
    -webkit-mask:radial-gradient(circle 3px at 0 0,transparent 98%,#000) -3px -3px/10px 10px;}
  .stamp .inner{width:100%;height:100%;border:1px solid var(--wax);
    display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--wax);}
  .stamp .heart{font-size:18px;line-height:1;}
  .stamp .txt{font-size:5.5px;letter-spacing:.5px;margin-top:3px;text-transform:uppercase;}
  .postmark{position:absolute;top:23px;right:19px;z-index:6;width:44px;height:44px;border-radius:50%;
    border:1.5px solid rgba(60,52,40,.45);transform:rotate(-12deg);opacity:.5;pointer-events:none;
    display:flex;align-items:center;justify-content:center;text-align:center;font-size:6px;
    color:rgba(60,52,40,.75);letter-spacing:.3px;line-height:1.25;}

  /* address moved to the lower-left of the pocket, clear of the seal */
  .address{position:absolute;left:28px;bottom:14px;z-index:4;
    font-family:'Caveat',cursive;color:var(--ink);transform:rotate(-2deg);}
  .address .to{font-size:15px;color:var(--ink-soft);}
  .address .name{font-size:26px;line-height:1;}

  /* wax seal — seals the flap tip, clear of the address */
  .seal{position:absolute;left:50%;top:92px;transform:translate(-50%,0);
    width:46px;height:46px;border-radius:50%;
    background:radial-gradient(circle at 38% 32%,var(--wax-hi),var(--wax) 70%);
    box-shadow:0 3px 8px rgba(80,20,18,.4),inset 0 2px 4px rgba(255,255,255,.25);
    z-index:7;display:flex;align-items:center;justify-content:center;
    color:rgba(255,235,225,.85);font-size:20px;
    transition:transform .4s ease,opacity .4s ease;}
  .seal::before{content:"";position:absolute;inset:5px;border-radius:50%;border:1px dashed rgba(255,225,215,.35);}

  .hint{position:absolute;left:50%;bottom:-44px;transform:translateX(-50%);white-space:nowrap;
    font-style:italic;color:rgba(58,40,24,.85);font-size:16px;animation:pulse 2.2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:.55}50%{opacity:1}}

  .open .flap{transform:rotateX(-178deg);z-index:1;}
  .open .seal{transform:translate(-50%,-6px) scale(.4);opacity:0;}
  .open .envelope{transform:translateY(120px) scale(.82);opacity:0;pointer-events:none;transition-delay:.35s;}
  .open .hint{opacity:0;animation:none;}

  .reopen{position:absolute;bottom:-2px;left:50%;transform:translateX(-50%);
    opacity:0;pointer-events:none;transition:opacity .5s ease;
    font-family:'EB Garamond',serif;font-style:italic;font-size:15px;
    color:rgba(58,40,24,.8);background:transparent;border:none;cursor:pointer;
    text-decoration:underline;text-underline-offset:3px;}
  .open .reopen{opacity:1;pointer-events:auto;transition-delay:2.2s;}
  .reopen:hover,.reopen:focus-visible{color:var(--wax);outline:none;}

  @media (max-width:380px){.salut{font-size:21px}.msg p{font-size:16.5px}.sign{font-size:30px}}
  @media (prefers-reduced-motion:reduce){
    .card,.envelope,.flap,.seal,.card *{transition:none!important}
    .hint{animation:none}.hearts span{animation:none;display:none}
  }
</style>
</head>
<body>
  <div class="bg">
    <div class="spotlight"></div>
    <div class="hearts" id="hearts"></div>
    <div class="vignette"></div>
  </div>

  <div class="stage" id="stage">
    <div class="desk-shadow"></div>

    <article class="card">
      <div class="salut">Lieve papski,</div>
      <div class="msg">
        <p>Bedankt voor alles. Fijne Vaderdag!</p>
      </div>
      <div class="sign">Met liefde</div>
    </article>

    <div class="envelope" id="env" role="button" tabindex="0" aria-label="Open de brief">
      <div class="env-body"></div>
      <div class="pocket"></div>
      <div class="postmark">VADERDAG<br>• 2026 •</div>
      <div class="stamp"><div class="inner"><span class="heart">♥</span><span class="txt">Papski</span></div></div>
      <div class="address"><div class="to">Aan:</div><div class="name">de liefste papski</div></div>
      <div class="flap"></div>
      <div class="seal">♥</div>
      <div class="hint">Klik om te openen</div>
    </div>

    <button class="reopen" id="reopen">brief weer sluiten</button>
  </div>

<script>
  // floating hearts
  const hc = document.getElementById('hearts');
  const reduce = window.matchMedia('(prefers-reduced-motion:reduce)').matches;
  if(!reduce){
    for(let i=0;i<9;i++){
      const s=document.createElement('span');
      s.textContent='♥';
      s.style.left=(5+Math.random()*90)+'%';
      const dur=11+Math.random()*9;
      s.style.animationDuration=dur+'s';
      s.style.animationDelay=(-Math.random()*dur)+'s';
      s.style.fontSize=(13+Math.random()*16)+'px';
      s.style.opacity=(0.3+Math.random()*0.35).toFixed(2);
      hc.appendChild(s);
    }
  }

  const stage=document.getElementById('stage');
  const env=document.getElementById('env');
  const reopen=document.getElementById('reopen');
  const open=()=>stage.classList.add('open');
  const close=()=>stage.classList.remove('open');
  env.addEventListener('click',open);
  env.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();open();}});
  reopen.addEventListener('click',close);
</script>
</body>
</html>
